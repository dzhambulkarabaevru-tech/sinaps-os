[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Пайплайн M0→M10 — несколько последовательных вызовов Claude API подряд,
# может занимать 20-40+ секунд. Бесплатный план Netlify (10 сек) почти
# гарантированно оборвёт запрос по таймауту — нужен платный план (26 сек)
# и/или явное увеличение таймаута для конкретной функции ниже.
[functions."api/create-path"]
  included_files = ["knowledge-base/**"]
  timeout = 26

[functions."library"]
  included_files = ["knowledge-base/content-library/**"]

[functions."growth-map"]
  included_files = ["knowledge-base/**"]
